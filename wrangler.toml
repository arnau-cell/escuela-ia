name = "escuela-ia"
compatibility_date = "2026-07-03"
# Necesario para @anthropic-ai/sdk (usa APIs de Node que no están disponibles por defecto en el
# runtime de Workers) — pivote 2026-07-04, núcleo conversacional + Q&A de la Wiki de la IA.
compatibility_flags = ["nodejs_compat"]

# Entrypoint unificado del adapter @astrojs/cloudflare (dev y producción) — el sitio sigue
# prerenderizado en su mayoría; este entrypoint solo entra en juego para las rutas con
# `export const prerender = false` (src/pages/api/**).
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist"

# Contador de límite de uso (por IP/día) para /api/nucleo/chat y /api/wiki/ask — evita dejar el
# endpoint de LLM abierto a coste ilimitado en un sitio gratuito y público. Namespace real
# creado 2026-07-05 (`wrangler kv namespace create RATE_LIMIT`).
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "937199fe2ecb4d93bf070a93a3d36b13"

# El adapter @astrojs/cloudflare habilita "sessions" por defecto (no lo usamos en este proyecto)
# y necesita un KV propio para eso. Sin declararlo aquí, `wrangler deploy`/Workers Builds intenta
# auto-crearlo en cada despliegue y falla si ya existe uno con el mismo nombre de un intento
# anterior (id real listado con `wrangler kv namespace list`, 2026-07-05).
[[kv_namespaces]]
binding = "SESSION"
id = "c5c80ae0525f49ef8d3795d5d6bf7303"

# D1 del ranking de herramientas (RANKING-WIKI R1, 2026-07-05): agregados de votos/recomendaciones
# del núcleo/puntuación editorial, sin ningún dato personal (ver migrations/0001_tool_stats.sql).
# Base real creada el 2026-07-05 (`wrangler d1 create escuela-ia-ranking`, autorizado por Arnau).
[[d1_databases]]
binding = "RANKING_DB"
database_name = "escuela-ia-ranking"
database_id = "765b5635-fd21-4b5c-9081-88f04e30c4ad"
migrations_dir = "migrations"
